version: "3.1"
services:
  hyper-postgres:
    image: postgres:15.3
    environment:
      - POSTGRES_USER=/run/secrets/.db_user
      - POSTGRES_PASSWORD=/run/secrets/.db_pass
      - POSTGRES_DB=hyper-db
    secrets:
      - db_user
      - db_user_password
    ports:
      - "5432:5432"
    networks:
      - hyper-network
    volumes:
      - hyper-volume:/var/lib/postgresql/data

networks:
  hyper-network:

volumes:
  hyper-volume:

secrets:
  db_user:
    environment: "DB_USER"
  db_user_password:
    environment: "DB_USER_PASSWORD"
